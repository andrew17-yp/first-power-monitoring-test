<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Phase Power Monitoring Dashboard</title>
    <!-- Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #1e222b; color: #e1e6ed; padding: 25px; }
        
        /* Header Styling */
        .header { display: flex; justify-content: space-between; align-items: center; background: #282c34; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 25px; }
        .header h1 { font-size: 1.4rem; color: #abb2bf; display: flex; align-items: center; gap: 12px; }
        
        .status-badge { padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background-color: #e06c75; color: #fff; letter-spacing: 1px; transition: all 0.3s ease; }
        .status-badge.connected { background-color: #98c379; color: #1e222b; box-shadow: 0 0 10px rgba(152, 195, 121, 0.4); }

        /* Dashboard Grid System */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        
        /* Main Parameter Card */
        .param-card { background: #282c34; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-top: 4px solid #5c6370; }
        .param-card.voltage { border-top-color: #61afef; }
        .param-card.current { border-top-color: #98c379; }
        .param-card.power { border-top-color: #d19a66; }
        .param-card.thd { border-top-color: #e06c75; }

        .param-title { font-size: 1.1rem; color: #abb2bf; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .param-title i { opacity: 0.8; }

        /* Phase Grid inside Card */
        .phase-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        /* Individual Phase Box */
        .phase-box { background: #2c313c; padding: 15px 10px; border-radius: 8px; text-align: center; position: relative; transition: transform 0.2s, background-color 0.2s; border: 1px solid #3e4452; }
        .phase-box:hover { transform: translateY(-3px); background: #353b48; }
        
        .phase-label { font-size: 0.75rem; font-weight: bold; color: #5c6370; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .phase-value { font-size: 1.6rem; font-weight: bold; display: block; word-break: break-all; }
        .unit { font-size: 0.8rem; font-weight: normal; color: #abb2bf; margin-left: 2px; }

        /* Phase Identity Colors */
        .box-r .phase-label { color: #e06c75; } 
        .box-s .phase-label { color: #d19a66; } 
        .box-t .phase-label { color: #61afef; } 

        .box-r .phase-value { color: #e06c75; }
        .box-s .phase-value { color: #d19a66; }
        .box-t .phase-value { color: #61afef; }

        /* Responsive Design adjustment */
        @media (max-width: 600px) {
            .phase-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1><i class="fa-solid fa-bolt" style="color: #d19a66;"></i> POWER QUALITY MONITORING (3-PHASE)</h1>
        <span id="mqtt-status" class="status-badge">DISCONNECTED</span>
    </div>

    <!-- Container Utama Grid Monitoring -->
    <div class="dashboard-grid">
        
        <!-- CARD TEGANGAN -->
        <div class="param-card voltage">
            <div class="param-title">
                <i class="fa-solid fa-car-battery" style="color: #61afef;"></i> Tegangan (Voltage)
            </div>
            <div class="phase-grid">
                <div class="phase-box box-r">
                    <div class="phase-label">Fasa R</div>
                    <span class="phase-value"><span id="v-r">--</span><span class="unit">V</span></span>
                </div>
                <div class="phase-box box-s">
                    <div class="phase-label">Fasa S</div>
                    <span class="phase-value"><span id="v-s">--</span><span class="unit">V</span></span>
                </div>
                <div class="phase-box box-t">
                    <div class="phase-label">Fasa T</div>
                    <span class="phase-value"><span id="v-t">--</span><span class="unit">V</span></span>
                </div>
            </div>
        </div>

        <!-- CARD ARUS -->
        <div class="param-card current">
            <div class="param-title">
                <i class="fa-solid fa-wave-square" style="color: #98c379;"></i> Arus (Current)
            </div>
            <div class="phase-grid">
                <div class="phase-box box-r">
                    <div class="phase-label">Fasa R</div>
                    <span class="phase-value"><span id="i-r">--</span><span class="unit">A</span></span>
                </div>
                <div class="phase-box box-s">
                    <div class="phase-label">Fasa S</div>
                    <span class="phase-value"><span id="i-s">--</span><span class="unit">A</span></span>
                </div>
                <div class="phase-box box-t">
                    <div class="phase-label">Fasa T</div>
                    <span class="phase-value"><span id="i-t">--</span><span class="unit">A</span></span>
                </div>
            </div>
        </div>

        <!-- CARD DAYA AKTIF -->
        <div class="param-card power">
            <div class="param-title">
                <i class="fa-solid fa-chart-line" style="color: #d19a66;"></i> Daya Aktif (Active Power)
            </div>
            <div class="phase-grid">
                <div class="phase-box box-r">
                    <div class="phase-label">Fasa R</div>
                    <span class="phase-value"><span id="kw-r">--</span><span class="unit">kW</span></span>
                </div>
                <div class="phase-box box-s">
                    <div class="phase-label">Fasa S</div>
                    <span class="phase-value"><span id="kw-s">--</span><span class="unit">kW</span></span>
                </div>
                <div class="phase-box box-t">
                    <div class="phase-label">Fasa T</div>
                    <span class="phase-value"><span id="kw-t">--</span><span class="unit">kW</span></span>
                </div>
            </div>
        </div>

        <!-- CARD THD -->
        <div class="param-card thd">
            <div class="param-title">
                <i class="fa-solid fa-triangle-exclamation" style="color: #e06c75;"></i> THD (Harmonik)
            </div>
            <div class="phase-grid">
                <div class="phase-box box-r">
                    <div class="phase-label">Fasa R</div>
                    <span class="phase-value"><span id="thd-r">--</span><span class="unit">%</span></span>
                </div>
                <div class="phase-box box-s">
                    <div class="phase-label">Fasa S</div>
                    <span class="phase-value"><span id="thd-s">--</span><span class="unit">%</span></span>
                </div>
                <div class="phase-box box-t">
                    <div class="phase-label">Fasa T</div>
                    <span class="phase-value"><span id="thd-t">--</span><span class="unit">%</span></span>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
