<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Phase Power Monitoring Dashboard</title>
    <!-- Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #1e222b; color: #e1e6ed; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background: #282c34; padding: 15px 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .header h1 { font-size: 1.4rem; color: #abb2bf; display: flex; align-items: center; gap: 10px; }
        
        .status-badge { padding: 6px 14px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; background-color: #e06c75; color: #fff; letter-spacing: 0.5px; }
        .status-badge.connected { background-color: #98c379; color: #1e222b; }

        .monitor-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-bottom: 20px; }
        .monitor-table th { background-color: #282c34; padding: 15px; text-align: center; font-size: 0.9rem; text-transform: uppercase; color: #abb2bf; letter-spacing: 0.5px; }
        .monitor-table th:first-child { border-radius: 6px 0 0 6px; text-align: left; }
        .monitor-table th:last-child { border-radius: 0 6px 6px 0; }
        
        .monitor-table td { background-color: #2c313c; padding: 15px; text-align: center; font-size: 1.4rem; font-weight: bold; }
        .monitor-table td:first-child { border-radius: 6px 0 0 6px; text-align: left; font-size: 1rem; font-weight: normal; color: #abb2bf; width: 25%; }
        .monitor-table td:last-child { border-radius: 0 6px 6px 0; }

        .phase-r { color: #e06c75; } 
        .phase-s { color: #d19a66; } 
        .phase-t { color: #61afef; } 
        
        .unit { font-size: 0.85rem; font-weight: normal; color: #5c6370; margin-left: 4px; }

        /* Grid System untuk Grafik */
        .chart-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-top: 10px; }
        .chart-card { background-color: #282c34; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .chart-card h3 { font-size: 1rem; color: #abb2bf; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-bolt" style="color: #d19a66;"></i> POWER QUALITY MONITORING (3-PHASE)</h1>
        <span id="mqtt-status" class="status-badge">DISCONNECTED</span>
    </div>

    <table class="monitor-table">
        <thead>
            <tr>
                <th>Parameter</th>
                <th class="phase-r">Fasa R</th>
                <th class="phase-s">Fasa S</th>
                <th class="phase-t">Fasa T</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><i class="fa-solid fa-car-battery"></i> Tegangan (Voltage)</td>
                <td class="phase-r"><span id="v-r">--</span><span class="unit">V</span></td>
                <td class="phase-s"><span id="v-s">--</span><span class="unit">V</span></td>
                <td class="phase-t"><span id="v-t">--</span><span class="unit">V</span></td>
            </tr>
            <tr>
                <td><i class="fa-solid fa-wave-square"></i> Arus (Current)</td>
                <td class="phase-r"><span id="i-r">--</span><span class="unit">A</span></td>
                <td class="phase-s"><span id="i-s">--</span><span class="unit">A</span></td>
                <td class="phase-t"><span id="i-t">--</span><span class="unit">A</span></td>
            </tr>
            <tr>
                <td><i class="fa-solid fa-chart-line"></i> Daya Aktif (kW)</td>
                <td class="phase-r"><span id="kw-r">--</span><span class="unit">kW</span></td>
                <td class="phase-s"><span id="kw-s">--</span><span class="unit">kW</span></td>
                <td class="phase-t"><span id="kw-t">--</span><span class="unit">kW</span></td>
            </tr>
            <tr>
                <td><i class="fa-solid fa-triangle-exclamation"></i> THD (Harmonik)</td>
                <td class="phase-r"><span id="thd-r">--</span><span class="unit">%</span></td>
                <td class="phase-s"><span id="thd-s">--</span><span class="unit">%</span></td>
                <td class="phase-t"><span id="thd-t">--</span><span class="unit">%</span></td>
            </tr>
        </tbody>
    </table>

    <!-- Section Grafik Baru -->
    <div class="chart-container">
        <div class="chart-card">
            <h3><i class="fa-solid fa-chart-area" style="color: #e06c75;"></i> Tren Tegangan (Volt)</h3>
            <canvas id="voltageChart"></canvas>
        </div>
        <div class="chart-card">
            <h3><i class="fa-solid fa-chart-area" style="color: #61afef;"></i> Tren Arus (Ampere)</h3>
            <canvas id="currentChart"></canvas>
        </div>

    <script src="script.js"></script>
</body>
</html>
